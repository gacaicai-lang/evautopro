<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e53e2f"/>
      <stop offset="100%" stop-color="#b22e21"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Decorative scene icon (large, faded) -->
  <text x="700" y="540" font-family="-apple-system, sans-serif" font-size="240" opacity="0.12" text-anchor="end">🔍</text>

  <!-- Main brand-red gradient circle with main icon -->
  <circle cx="280" cy="280" r="140" fill="url(#brand)"/>
  <text x="280" y="335" font-family="-apple-system, sans-serif" font-size="140" fill="white" text-anchor="middle">🛠</text>

  <!-- Title text right side -->
  <text x="450" y="240" font-family="-apple-system, sans-serif" font-size="42" font-weight="800" fill="#18181b" >FAQ</text>
  <text x="450" y="285" font-family="-apple-system, sans-serif" font-size="28" font-weight="600" fill="#18181b" >Warranty & After-Sales</text>
  <text x="450" y="320" font-family="-apple-system, sans-serif" font-size="16" fill="#52525b">5 年保 · 配件 · 培训</text>

  <!-- Priority badge -->
  <rect x="40" y="40" width="80" height="32" rx="16" fill="#e53e2f"/>
  <text x="80" y="61" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">FAQ</text>

  <!-- Brand watermark bottom -->
  <text x="40" y="560" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#18181b" opacity="0.5">EV AUTO PRO</text>
</svg>