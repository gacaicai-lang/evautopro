# Cloudflare Pages deployment — replaces deploy.yml (GitHub Pages) once the
# migration is done. Until then this only runs manually.
#
# Activation checklist (migration day):
#   1. Repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   2. CF Pages project "evautopro" exists (created via API/wrangler)
#   3. Change `on:` below to `push: { branches: [main] }` and delete deploy.yml
name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Astro site
        run: npx astro build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name evautopro --branch main
