# Cloudflare Pages deployment — the real production deploy target.
# evautopro.com's DNS points at the "evautopro" CF Pages project (direct-upload,
# no git integration), activated 2026-07-09. deploy.yml (GitHub Pages) is now
# dead weight — GitHub Pages is not what the domain serves — kept disabled
# (workflow_dispatch only) rather than deleted, in case of rollback need.
name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# This workflow only needs to read the repo and deploy to Cloudflare — it
# never pushes back to GitHub, so it gets no write access by default.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Content publish gate — blocks the deploy on fabricated-credential
      # claims, phantom-model pricing, broken internal links, or missing
      # images in src/data/news.ts. See scripts/article-gate.py header for
      # the 2026-07-18 incident that made this mandatory.
      - name: Article publish gate
        run: python3 scripts/article-gate.py

      - name: Build Astro site
        run: npx astro build

      - name: Deploy to Cloudflare Pages
        # Not using cloudflare/wrangler-action@v3: it npm-installs wrangler
        # into this project's own node_modules without --legacy-peer-deps,
        # which collides with the same @astrojs/tailwind/astro peer conflict
        # every other install step in this repo has to work around. Direct
        # npx avoids touching the project's dependency tree at all — this is
        # the exact command verified working by hand on 2026-07-09.
        # wrangler pinned to an exact version (was @latest, which silently
        # runs whatever wrangler ships on deploy day with live CF deploy
        # credentials) — bump this deliberately, not automatically.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4.112.0 pages deploy dist --project-name evautopro --branch main
