# Disabled 2026-07-09: evautopro.com no longer points at GitHub Pages —
# the domain now serves from the "evautopro" Cloudflare Pages project
# (see deploy-cloudflare.yml). Kept as workflow_dispatch only in case of
# rollback need; do not re-enable the push trigger without re-pointing DNS.
name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Astro site
        run: npx astro build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - id: deployment
        uses: actions/deploy-pages@v4
